<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="20" y="20" width="140" height="140" rx="32" fill="url(#bg)" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Cable connector icon (simplified) -->
  <!-- Left plug -->
  <rect x="42" y="78" width="28" height="24" rx="4" fill="none" stroke="url(#stroke)" stroke-width="3.5"/>
  <line x1="42" y1="86" x2="36" y2="86" stroke="url(#stroke)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="42" y1="96" x2="36" y2="96" stroke="url(#stroke)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Cable line -->
  <path d="M70 90 C 82 90, 82 90, 90 82 C 98 74, 98 106, 90 98 C 82 90, 82 90, 110 90"
        fill="none" stroke="url(#stroke)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right plug -->
  <rect x="110" y="78" width="28" height="24" rx="4" fill="none" stroke="url(#stroke)" stroke-width="3.5"/>
  <line x1="138" y1="86" x2="144" y2="86" stroke="url(#stroke)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="138" y1="96" x2="144" y2="96" stroke="url(#stroke)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Label -->
  <text x="90" y="145" text-anchor="middle" fill="#1e1b4b" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" letter-spacing="2">LOOPBACKER</text>
</svg>
